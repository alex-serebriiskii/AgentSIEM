name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "10.0.x"
  DOCKER_IMAGE: agentsiem

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run unit tests (Siem.Rules.Core.Tests)
        run: dotnet run --project tests/Siem.Rules.Core.Tests/Siem.Rules.Core.Tests.csproj -c Release --no-build

      - name: Run unit tests (Siem.Api.Tests)
        run: dotnet run --project tests/Siem.Api.Tests/Siem.Api.Tests.csproj -c Release --no-build

      - name: Run integration tests
        run: dotnet run --project tests/Siem.Integration.Tests/Siem.Integration.Tests.csproj -c Release --no-build

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} -t ${{ env.DOCKER_IMAGE }}:latest .

      - name: Verify Docker image
        run: docker image inspect ${{ env.DOCKER_IMAGE }}:latest
