name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "10.0.x"
  DOCKER_IMAGE: ghcr.io/alex-serebriiskii/agentsiem

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run unit tests (Siem.Rules.Core.Tests)
        run: dotnet run --project tests/Siem.Rules.Core.Tests/Siem.Rules.Core.Tests.csproj -c Release --no-build

      - name: Run unit tests (Siem.Api.Tests)
        run: dotnet run --project tests/Siem.Api.Tests/Siem.Api.Tests.csproj -c Release --no-build

      - name: Run integration tests
        run: dotnet run --project tests/Siem.Integration.Tests/Siem.Integration.Tests.csproj -c Release --no-build

  version:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pull-requests: read
    outputs:
      version: ${{ steps.calc.outputs.version }}
      tag: ${{ steps.calc.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: calc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAJOR=$(cat VERSION | tr -d '[:space:]')
          echo "Major version: ${MAJOR}"

          # Find the latest tag for this major version
          LATEST=$(git tag -l "v${MAJOR}.*.*" --sort=-v:refname | head -1)
          echo "Latest tag: ${LATEST:-none}"

          if [ -z "$LATEST" ]; then
            # First version in this major
            NEXT="${MAJOR}.1.0"
          else
            MINOR=$(echo "$LATEST" | sed 's/^v[0-9]*\.//' | cut -d. -f1)
            PATCH=$(echo "$LATEST" | sed 's/^v[0-9]*\.//' | cut -d. -f2)

            # Check if the merged PR had a 'patch' label
            IS_PATCH="false"
            PR_JSON=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq '.[0] // empty' 2>/dev/null || true)
            if [ -n "$PR_JSON" ]; then
              PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
              LABELS=$(echo "$PR_JSON" | jq -r '[.labels[].name] | join(",")')
              echo "PR #${PR_NUMBER} labels: ${LABELS}"
              if echo "$LABELS" | grep -q "patch"; then
                IS_PATCH="true"
              fi
            else
              echo "No associated PR found for commit ${{ github.sha }}"
            fi

            if [ "$IS_PATCH" = "true" ]; then
              NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
            else
              NEXT="${MAJOR}.$((MINOR + 1)).0"
            fi
          fi

          echo "Next version: ${NEXT}"
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT}" >> "$GITHUB_OUTPUT"

  docker:
    runs-on: ubuntu-latest
    needs: [build-and-test, version]
    if: always() && needs.build-and-test.result == 'success'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute major.minor tag
        id: short-version
        if: needs.version.outputs.version != ''
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          echo "major_minor=${VERSION%.*}" >> "$GITHUB_OUTPUT"

      - name: Docker tags (main with version)
        id: meta-versioned
        if: needs.version.outputs.tag != ''
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=${{ steps.short-version.outputs.major_minor }}

      - name: Docker tags (PR only)
        id: meta-pr
        if: needs.version.outputs.tag == ''
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ needs.version.outputs.tag != '' && steps.meta-versioned.outputs.tags || steps.meta-pr.outputs.tags }}
          labels: ${{ needs.version.outputs.tag != '' && steps.meta-versioned.outputs.labels || steps.meta-pr.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs: [version, docker]
    if: needs.version.outputs.tag != ''
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.version.outputs.tag }}"

          # Create and push the git tag
          git tag "$TAG"
          git push origin "$TAG"

          # Find previous tag for release notes range
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | sed -n '2p')
          NOTES_FLAG=""
          if [ -n "$PREV_TAG" ]; then
            NOTES_FLAG="--notes-start-tag $PREV_TAG"
          fi

          # Create the release with auto-generated notes
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $NOTES_FLAG
